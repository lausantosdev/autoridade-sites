    <!-- Layout fixes for React App -->
    <style>
      /* Group nav links + CTA together on the right (Apple-style) */
      @media (min-width: 768px) {
        header.fixed nav > div {
          gap: 2rem !important;
        }
        header.fixed nav > div > a:first-child {
          margin-right: auto !important;
        }
      }

      /* Mobile-first hero image fix */
      @media (max-width: 768px) {
        main > section:first-of-type img {
          object-position: center center !important;
        }

        /* === DARK THEME MOBILE === */
        html[data-theme="dark"] main > section:first-of-type > div.absolute.inset-0.z-\[1\] {
          background: linear-gradient(
            to bottom,
            rgba(0, 0, 0, 0.85) 0%,
            rgba(0, 0, 0, 0.85) 75%,
            #0b0d11 100%
          ) !important;
        }
        html[data-theme="dark"] main > section:first-of-type h1 {
          color: #ffffff !important;
        }
        html[data-theme="dark"] main > section:first-of-type p {
          color: rgba(255, 255, 255, 0.90) !important;
        }

        /* === LIGHT THEME MOBILE === */
        html[data-theme="light"] main > section:first-of-type > div.absolute.inset-0.z-\[1\] {
          background: linear-gradient(
            to bottom,
            rgba(255, 255, 255, 0.88) 0%,
            rgba(255, 255, 255, 0.82) 50%,
            rgba(248, 250, 252, 0.97) 100%
          ) !important;
        }
        html[data-theme="light"] main > section:first-of-type h1 {
          color: #0f172a !important;
          text-shadow: 0 1px 4px rgba(255,255,255,0.8);
        }
        html[data-theme="light"] main > section:first-of-type p {
          color: rgba(15, 23, 42, 0.88) !important;
          text-shadow: 0 1px 3px rgba(255,255,255,0.7);
        }
      }

      /* Adaptive services grid — fits N cards without empty slots */
      #diferenciais [class*="grid"],
      [id*="diferenciais"] [class*="Grid"] {
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)) !important;
        justify-content: center !important;
      }
    </style>
