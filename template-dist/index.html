<script>
// B-01 FIX DEFINITIVO: Converte layout de 'Tabela/Grid' para 'Cards Flutuantes Premium'
// Resolve de uma vez o problema de slots vazios, bordas aparentes e alinhamento
window.addEventListener('load', function() {
  function upgradeToPremiumCards() {
    // Alvo estrito: Apenas a div que era o grid real (evita pegar os títulos do cabeçalho)
    var gridContainers = document.querySelectorAll('#diferenciais .grid, [id*="diferenciais"] .grid, .grid.grid-cols-1.sm\\:grid-cols-2');
    
    // Fallback: se não achar pela classe .grid exata, pega o container que tem os cards
    if (gridContainers.length === 0) {
      gridContainers = Array.from(document.querySelectorAll('[id*="diferenciais"] > div > div')).filter(function(el) {
        // O grid de cards sempre tem mais de 3 elementos filhos (os cards em si)
        return el.children.length > 3;
      });
    }

    gridContainers.forEach(function(grid) {
      // 1. Remove as classes que formam a "Tabela" e os fundos cinzas
      grid.className = grid.className.replace(/grid(\s|-cols-[a-z0-9:-]+)/g, '');
      grid.classList.remove('gap-px', 'bg-border', 'border', 'border-border', 'overflow-hidden', 'rounded-2xl', 'grid');
      
      // 2. Transforma o container num Flexbox livre para distribuir os cards soltos
      grid.classList.add('flex', 'flex-wrap', 'justify-center');
      grid.style.gap = '1.5rem';
      grid.style.background = 'transparent';

      // 3. Eleva cada filho(serviço) ao status de Card independente
      Array.from(grid.children).forEach(function(card) {
        // Verifica se é um filler/ghost card ou tem conteúdo real
        var hasContent = card.textContent.trim().length > 0 || card.querySelector('svg, img');
        
        if (!hasContent || card.getAttribute('aria-hidden') === 'true') {
          card.style.display = 'none'; // Some permanentemente com ghosts/brancos
        } else {
          // Adiciona as classes Tailwind para criar a caixinha bonitinha
          card.classList.add('border', 'border-border', 'rounded-2xl', 'shadow-sm', 'bg-background', 'premium-service-card');
        }
      });
    });
  }
  
  // Roda assim que o react gerar o DOM
  setTimeout(upgradeToPremiumCards, 300);
  setTimeout(upgradeToPremiumCards, 800);
});
</script>
